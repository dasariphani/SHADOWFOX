<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoValuate Pro | Enterprise Car Valuation</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #1e293b, var(--bg)); color: white; min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; }
        .glass-card { background: var(--card); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px; width: 100%; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { margin: 0; font-size: 1.8rem; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .full-width { grid-column: span 2; }
        .input-box { display: flex; flex-direction: column; }
        label { font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; color: #94a3b8; }
        input, select { background: rgba(15, 23, 42, 0.6); border: 1px solid #334155; border-radius: 12px; padding: 12px; color: white; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0, 242, 254, 0.1); }
        button { background: linear-gradient(45deg, var(--secondary), var(--primary)); border: none; border-radius: 12px; padding: 16px; color: #0f172a; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3); }
        #result-container { margin-top: 30px; padding: 20px; border-radius: 16px; background: rgba(255,255,255,0.03); display: none; text-align: center; border: 1px dashed rgba(255,255,255,0.1); }
        .price-tag { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin: 10px 0; }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="header">
            <h1>🚘 AutoValuate Pro</h1>
            <p style="color: #94a3b8; font-size: 0.9rem;">Enterprise AI Valuation Engine</p>
        </div>
        <form id="valuationForm">
            <div class="grid">
                <div class="input-box full-width">
                    <label>Showroom Price (₹ Lakhs)</label>
                    <input type="number" id="p_price" step="0.1" placeholder="e.g. 8.5" required>
                </div>
                <div class="input-box">
                    <label>Year of Purchase</label>
                    <input type="number" id="year" placeholder="e.g. 2018" required>
                </div>
                <div class="input-box">
                    <label>Distance (KMs)</label>
                    <input type="number" id="kms" placeholder="e.g. 35000" required>
                </div>
                <div class="input-box">
                    <label>Fuel Type</label>
                    <select id="fuel"><option value="0">Petrol</option><option value="1">Diesel</option><option value="2">CNG</option></select>
                </div>
                <div class="input-box">
                    <label>Transmission</label>
                    <select id="trans"><option value="0">Manual</option><option value="1">Automatic</option></select>
                </div>
            </div>
            <button type="submit">ANALYZE VALUE</button>
        </form>
        <div id="result-container">
            <span style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8;">Estimated Market Price</span>
            <div class="price-tag" id="priceDisplay">₹ 0.00 L</div>
            <p id="analysisMsg" style="font-size: 0.85rem; color: #64748b;"></p>
        </div>
    </div>

    <script>
        document.getElementById('valuationForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "PROCESSING DATA...";
            
            // Logic to calculate age locally for the model
            const age = 2024 - parseInt(document.getElementById('year').value);
            
            const features = [
                parseFloat(document.getElementById('p_price').value),
                age,
                parseFloat(document.getElementById('kms').value),
                parseInt(document.getElementById('fuel').value),
                0, // Seller Default
                parseInt(document.getElementById('trans').value),
                0  // Owner Default
            ];
            
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({features})
            });
            const data = await response.json();
            
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('priceDisplay').innerText = "₹ " + data.prediction + " Lakhs";
            document.getElementById('analysisMsg').innerText = "Based on " + age + " years of service and current demand.";
            btn.innerText = "ANALYZE VALUE";
        };
    </script>
</body>
</html>
